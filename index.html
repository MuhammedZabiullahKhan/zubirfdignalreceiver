<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Zubi-RF COMM Signal Receiver</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a1a1a 0%, #0a0a0a 100%);
            font-family: 'Courier New', 'Monaco', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .zubi-rf {
            max-width: 450px;
            width: 100%;
            background: linear-gradient(145deg, #2a2a2a 0%, #1a1a1a 100%);
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1), 0 0 0 3px #3a3a3a;
            overflow: hidden;
        }

        .antenna {
            width: 8px;
            height: 45px;
            background: linear-gradient(90deg, #8a8a8a, #c0c0c0, #8a8a8a);
            position: relative;
            margin-left: auto;
            margin-right: 25px;
            top: 10px;
            border-radius: 4px 4px 0 0;
        }

        .antenna::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -4px;
            width: 16px;
            height: 10px;
            background: #c0c0c0;
            border-radius: 50%;
        }

        .speaker {
            background: #111;
            margin: 20px 20px 10px 20px;
            padding: 12px;
            border-radius: 20px;
        }

        .grill-line {
            width: 100%;
            height: 3px;
            background: #333;
            margin: 2px 0;
            border-radius: 2px;
        }

        .lcd-display {
            background: #0a2a0a;
            margin: 10px 20px;
            padding: 15px 12px;
            border-radius: 12px;
            border: 2px solid #2ecc2e;
        }

        .frequency {
            text-align: center;
            margin-bottom: 10px;
        }

        .freq-label {
            color: #2ecc2e;
            font-size: 0.65rem;
            letter-spacing: 2px;
        }

        .freq-value {
            background: #000;
            color: #2ecc2e;
            font-size: 1.6rem;
            font-family: monospace;
            font-weight: bold;
            padding: 8px;
            border-radius: 8px;
            text-shadow: 0 0 5px #2ecc2e;
        }

        .channel-info {
            text-align: center;
            margin-top: 8px;
        }

        .channel-name {
            color: #2ecc2e;
            font-size: 0.7rem;
            background: #000;
            display: inline-block;
            padding: 3px 12px;
            border-radius: 15px;
        }

        .signal-icon {
            display: flex;
            justify-content: center;
            gap: 3px;
            margin-top: 8px;
        }

        .signal-bar {
            width: 4px;
            background: #2ecc2e;
            border-radius: 1px;
        }

        .signal-bar:nth-child(1) { height: 8px; }
        .signal-bar:nth-child(2) { height: 12px; }
        .signal-bar:nth-child(3) { height: 16px; }
        .signal-bar:nth-child(4) { height: 20px; }
        .signal-bar:nth-child(5) { height: 12px; }

        .branding {
            text-align: center;
            padding: 5px;
            font-size: 0.55rem;
            color: #5a7a5a;
        }

        .branding .model {
            color: #2ecc2e;
            font-weight: bold;
        }

        .channel-strip {
            display: flex;
            gap: 8px;
            padding: 10px 15px;
            background: #111;
            overflow-x: auto;
        }

        .channel-badge {
            background: #222;
            color: #5a7a5a;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            cursor: pointer;
            flex-shrink: 0;
        }

        .channel-badge.active {
            background: #2e4a2e;
            color: #2ecc2e;
            border: 1px solid #2ecc2e;
        }

        .keypad {
            padding: 10px 20px 20px 20px;
        }

        .key-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .key {
            background: linear-gradient(145deg, #333, #222);
            border: none;
            color: #2ecc2e;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
        }

        .key:active {
            transform: translateY(2px);
            background: #2e4a2e;
        }

        .key.special {
            background: linear-gradient(145deg, #2a3a2a, #1a2a1a);
            font-size: 0.8rem;
        }

        .key.enter {
            background: linear-gradient(145deg, #2e4a2e, #1a3a1a);
        }

        .status-leds {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding: 8px;
            background: #111;
            margin: 0 20px 15px 20px;
            border-radius: 20px;
        }

        .led {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.55rem;
            color: #5a7a5a;
        }

        .led .light {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #333;
        }

        .led.active .light {
            background: #2ecc2e;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .dev-credit {
            text-align: center;
            padding: 10px;
            background: #050805;
            font-size: 0.55rem;
            color: #4a6a4a;
        }

        .iframe-container {
            margin: 10px 20px;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 400px;
            border: none;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a2a1a;
            color: #2ecc2e;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.65rem;
            z-index: 10000;
            animation: fadeOut 2s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        .error-message {
            background: #2a1a1a;
            color: #ff6b6b;
            padding: 15px;
            margin: 10px 20px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="zubi-rf">
        <div class="antenna"></div>
        
        <div class="speaker">
            <div class="grill-line"></div>
            <div class="grill-line"></div>
            <div class="grill-line"></div>
        </div>

        <div class="lcd-display">
            <div class="frequency">
                <div class="freq-label">ZUBI-RF COMM</div>
                <div class="freq-value" id="freqDisplay">7.175.000</div>
            </div>
            <div class="channel-info">
                <span class="channel-name" id="channelName">CH1: YAROSLAVL</span>
            </div>
            <div class="signal-icon">
                <div class="signal-bar"></div>
                <div class="signal-bar"></div>
                <div class="signal-bar"></div>
                <div class="signal-bar"></div>
                <div class="signal-bar"></div>
            </div>
        </div>

        <div class="branding">
            <span class="model">🔐 ZUBI-RF COMM SIGNAL RECEIVER</span>
        </div>

        <div class="channel-strip" id="channelStrip"></div>

        <div class="iframe-container">
            <iframe id="sdrIframe" src="about:blank" title="SDR Receiver"></iframe>
        </div>

        <div class="keypad">
            <div class="key-row">
                <button class="key" data-url="https://websdr.srr-76.ru/">1</button>
                <button class="key" data-url="https://websdr.ewi.utwente.nl:8901/">2</button>
                <button class="key" data-url="https://sdr.homeip.net:8901/">3</button>
            </div>
            <div class="key-row">
                <button class="key" data-url="https://appr.org.br:8901/">4</button>
                <button class="key" data-url="https://sdr.r9a.ru/">5</button>
                <button class="key" data-url="https://na5b.com:8901/">6</button>
            </div>
            <div class="key-row">
                <button class="key" data-url="https://radio-sdr.dyndns.org:8901/">7</button>
                <button class="key" data-url="https://80m.radiorubka.org/">8</button>
                <button class="key" data-url="https://sv3gcb.ddns.net:8905/">9</button>
            </div>
            <div class="key-row">
                <button class="key" data-url="https://remoteradio.changeip.org:8073/">10</button>
                <button class="key" data-url="https://85.173.189.23:8901/">11</button>
                <button class="key" data-url="https://lu3dj.ddns.net:8080/">12</button>
            </div>
            <div class="key-row">
                <button class="key enter" id="reloadBtn">⟳ RELOAD</button>
                <button class="key special" id="infoBtn">ℹ️ INFO</button>
            </div>
        </div>

        <div class="status-leds">
            <div class="led active"><span class="light"></span><span>PWR</span></div>
            <div class="led active"><span class="light"></span><span>RX</span></div>
            <div class="led"><span class="light"></span><span>TX</span></div>
            <div class="led active"><span class="light"></span><span>SDR</span></div>
        </div>

        <div class="dev-credit">
            ⚡ DEVELOPED BY <strong style="color:#2ecc2e;">@zabi</strong> ⚡
        </div>
    </div>

    <script>
        const channels = {
            1: { name: "YAROSLAVL", url: "https://websdr.srr-76.ru/", location: "Russia" },
            2: { name: "NETHERLANDS", url: "https://websdr.ewi.utwente.nl:8901/", location: "Twente" },
            3: { name: "USA HOMEIP", url: "https://sdr.homeip.net:8901/", location: "USA" },
            4: { name: "BRAZIL", url: "https://appr.org.br:8901/", location: "Brazil" },
            5: { name: "RUSSIA R9A", url: "https://sdr.r9a.ru/", location: "Russia" },
            6: { name: "USA NA5B", url: "https://na5b.com:8901/", location: "USA" },
            7: { name: "USA RADIO", url: "https://radio-sdr.dyndns.org:8901/", location: "USA" },
            8: { name: "RUSSIA 80m", url: "https://80m.radiorubka.org/", location: "Tambov" },
            9: { name: "GREECE", url: "https://sv3gcb.ddns.net:8905/", location: "Greece" },
            10: { name: "REMOTE", url: "https://remoteradio.changeip.org:8073/", location: "Global" },
            11: { name: "RUSSIA IP", url: "https://85.173.189.23:8901/", location: "Russia" },
            12: { name: "ARGENTINA", url: "https://lu3dj.ddns.net:8080/", location: "Argentina" }
        };

        let currentChannel = 1;
        const iframe = document.getElementById('sdrIframe');
        const channelNameSpan = document.getElementById('channelName');
        const channelStrip = document.getElementById('channelStrip');

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? '#3a1a1a' : '#1a2a1a';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function loadChannel(channelNum) {
            const channel = channels[channelNum];
            if (!channel) return;
            
            currentChannel = channelNum;
            channelNameSpan.innerHTML = `CH${channelNum}: ${channel.name} (${channel.location})`;
            
            document.querySelectorAll('.channel-badge').forEach((badge, idx) => {
                badge.classList.toggle('active', idx + 1 === channelNum);
            });
            
            // Load the SDR in iframe
            iframe.src = channel.url;
            
            showToast(`🔗 Connecting to ${channel.name}...`);
            
            // Handle iframe load error
            iframe.onerror = () => {
                showToast(`⚠️ Cannot load ${channel.name}. The SDR may not support HTTPS.`, true);
            };
        }

        function buildChannelStrip() {
            channelStrip.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                const badge = document.createElement('div');
                badge.className = 'channel-badge';
                badge.textContent = `${i}. ${channels[i].name.substring(0, 8)}`;
                badge.onclick = () => loadChannel(i);
                channelStrip.appendChild(badge);
            }
        }

        function reloadIframe() {
            iframe.src = channels[currentChannel].url;
            showToast("⟳ Reloading SDR...");
        }

        function showInfo() {
            showToast("📡 Select a channel to connect to SDR receivers worldwide", false);
        }

        // Initialize keypad buttons
        document.querySelectorAll('.key[data-url]').forEach((btn, index) => {
            btn.onclick = () => loadChannel(index + 1);
        });

        document.getElementById('reloadBtn').onclick = reloadIframe;
        document.getElementById('infoBtn').onclick = showInfo;

        // Initialize
        buildChannelStrip();
        loadChannel(1);
    </script>
</body>
</html>
